apiVersion: apps/v1
kind: Deployment
metadata:
  name: typesense
  namespace: typesense
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: typesense
  template:
    metadata:
      labels:
        app: typesense
    spec:
      containers:
        - name: typesense
          image: typesense/typesense:30.2

          args:
            - "--data-dir=/data"
            - "--api-key=$(TYPESENSE_API_KEY)"
            - "--enable-cors"

          ports:
            - containerPort: 8108

          env:
            - name: TYPESENSE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: typesense-secret
                  key: TYPESENSE_API_KEY

          volumeMounts:
            - name: typesense-data
              mountPath: /data

          # ✅ RESOURCE QUOTA
          resources:
            requests:
              memory: "9Gi"
              cpu: "500m"
            limits:
              memory: "12Gi"

          # ✅ HEALTH CHECKS
          startupProbe:
            httpGet:
              path: /health
              port: 8108
            failureThreshold: 30
            periodSeconds: 10

          readinessProbe:
            httpGet:
              path: /health
              port: 8108
            initialDelaySeconds: 10
            periodSeconds: 5

          livenessProbe:
            httpGet:
              path: /health
              port: 8108
            initialDelaySeconds: 30
            periodSeconds: 10

      volumes:
        - name: typesense-data
          persistentVolumeClaim:
            claimName: typesense-data

